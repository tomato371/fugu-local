[tool.ruff]
target-version = "py39"
line-length = 100
exclude = ["backups", "iterations"]

[tool.ruff.lint]
# High-signal rules first (real errors: syntax + pyflakes), not style noise.
# The rule set can be widened over time (e.g. add "E", "I", "UP").
select = ["E9", "F"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[tool.mypy]
python_version = "3.9"
# We type-check the small, typed surfaces (e.g. fugu_api.py) only.
ignore_missing_imports = true

# The large legacy orchestrator (fugu_local) is untyped — don't follow into it
# when checking the typed modules that import it.
[[tool.mypy.overrides]]
module = "fugu_local"
follow_imports = "skip"
